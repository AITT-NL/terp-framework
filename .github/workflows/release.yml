name: release

# Release pipeline (ADR 0063). Terp releases in LOCKSTEP: one tag `v<version>` publishes
# every backend distribution (PyPI, trusted publishing), every frontend package (npm,
# public scoped), and the production images (GHCR, with provenance). The gate's
# version-consistency test (tests/architecture/test_release_versions.py) refuses a
# partial release at build time; this workflow additionally checks the tag matches.

on:
  push:
    tags: ["v*"]
  # Manual, single-package publish to PyPI. A multi-package release pipeline has
  # two recurring needs the lockstep tag path cannot serve: FIRST-TIME project
  # creation and BACKFILL of one distribution whose upload failed mid-release.
  # PyPI trusted publishing cannot pre-register every not-yet-existing project at
  # once — a pending publisher's identity (owner, repo, workflow, environment) is
  # unique, so brand-new projects are necessarily created one at a time. This
  # entry point publishes ONLY the named package, through the SAME trusted-
  # publishing step (same workflow file + `release` environment), so the artifact
  # is attested exactly like a tagged release. The npm / image / GitHub-Release
  # legs stay tag-only — a manual dispatch never cuts a platform release.
  workflow_dispatch:
    inputs:
      package:
        description: >-
          Path of the single backend distribution to publish to PyPI, e.g.
          `packages/backend/core` or `packages/backend/capabilities/access`.
        required: true
        type: choice
        options:
          - packages/backend/core
          - packages/backend/arch
          - packages/backend/cli
          - packages/backend/migrations
          - packages/backend/capabilities/access
          - packages/backend/capabilities/audit
          - packages/backend/capabilities/auth
          - packages/backend/capabilities/eventbus
          - packages/backend/capabilities/files
          - packages/backend/capabilities/groups
          - packages/backend/capabilities/identity
          - packages/backend/capabilities/jobs_celery
          - packages/backend/capabilities/oidc
          - packages/backend/capabilities/outbox
          - packages/backend/capabilities/realtime
          - packages/backend/capabilities/redis
          - packages/backend/capabilities/scheduler_apscheduler
          - packages/backend/capabilities/scheduler_celery_beat
          - packages/backend/capabilities/sync
          - packages/backend/capabilities/tenancy
          - packages/backend/capabilities/users
          - packages/backend/capabilities/webhooks

permissions:
  contents: read

jobs:
  # The tag only releases what the gate has already proven — BOTH stacks: the
  # Python gate and the frontend checks run here, and every publish job needs
  # this verify. An npm package can never publish from a tag whose frontend
  # suite was not green at that tag.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: uv python install 3.14
      - name: Manual publish uses the default branch
        if: github.event_name == 'workflow_dispatch'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          test "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH" || {
            echo "manual publishing is allowed only from '$DEFAULT_BRANCH', got '$GITHUB_REF_NAME'"
            exit 1
          }
      - name: Tag matches the lockstep version
        if: github.event_name == 'push'
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -q "^version = \"$version\"" packages/backend/core/pyproject.toml \
            || { echo "tag $GITHUB_REF_NAME != package version"; exit 1; }
      - name: Run the gate
        run: uv run pytest --cov=terp
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Frontend checks (typecheck + tests + boundary lint + build)
        run: |
          set -eux
          npm run -w @terpjs/contract typecheck
          npm run -w @terpjs/react-core typecheck
          npm run -w @terpjs/react-core test
          npm run -w @terpjs/eslint-boundaries test
          npm run -w @terpjs-example/frontend typecheck
          npm run -w @terpjs-example/frontend lint
          npm run -w @terpjs-example/frontend build
      # The verifiable certification artifacts for this release: both checkers'
      # scorecards over the violation corpus (scorecard.schema.json), attached
      # to the verified run the publish jobs depend on.
      - name: Emit the conformance scorecards
        run: |
          set -eux
          uv run python tools/emit_backend_scorecard.py --out scorecard-terp-arch.json
          node packages/frontend/eslint-boundaries/src/scorecard.js --out scorecard-eslint-boundaries.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conformance-scorecards
          path: scorecard-*.json

  # Building executes package-controlled build backends and dependencies, so it
  # MUST stay outside the OIDC-privileged publisher job. The resulting immutable
  # workflow artifact is the only input crossing into the release environment.
  build-pypi:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      # Lockstep tag release: build every backend distribution into one dist/.
      - name: Build wheels + sdists for every backend distribution
        if: github.event_name == 'push'
        run: |
          set -eux
          for pkg in packages/backend/core packages/backend/arch packages/backend/migrations \
                     packages/backend/cli packages/backend/capabilities/*/; do
            uv build --out-dir dist "$pkg"
          done
      # Manual dispatch: build ONLY the named package (first-time create / backfill).
      # Treat the input as untrusted even though workflow_dispatch restricts it to a
      # finite choice: pass it through env (never expression-to-shell interpolation),
      # canonicalize it, and fail closed if it escapes the backend distribution tree.
      - name: Build a single backend distribution (manual bootstrap/backfill)
        if: github.event_name == 'workflow_dispatch'
        env:
          PACKAGE_PATH: ${{ inputs.package }}
        run: |
          set -euo pipefail
          backend_root="$(realpath -e -- "$GITHUB_WORKSPACE/packages/backend")"
          pkg="$(realpath -e -- "$GITHUB_WORKSPACE/$PACKAGE_PATH")"
          case "$pkg" in
            "$backend_root"/*) ;;
            *) echo "package must resolve under '$backend_root', got '$pkg'"; exit 1 ;;
          esac
          test -f "$pkg/pyproject.toml" || { echo "no pyproject.toml at '$pkg'"; exit 1; }
          uv build --out-dir dist "$pkg"
      - name: Upload distributions for the isolated publisher
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  # This job handles pre-built bytes only: no checkout, package build, dependency
  # installation, or repository-controlled code may execute with an OIDC token.
  publish-pypi:
    needs: build-pypi
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - name: Download the verified distribution artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pypi-distributions
          path: dist/
      # Every backend project on PyPI trusts this same (repo, workflow, environment)
      # publisher identity, so one upload publishes them all. skip-existing makes a
      # re-run of a partially failed release idempotent — critical because the
      # lockstep `==` pins make a partial publish uninstallable until completed.
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-npm:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older
      # npm. Upgrade so `npm publish` exchanges the id-token for a short-lived
      # registry credential — no NPM_TOKEN secret required. Provenance is emitted
      # automatically under Trusted Publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Publish the frontend packages (public, via Trusted Publishing)
        run: |
          set -eux
          version="${GITHUB_REF_NAME#v}"
          for ws in @terpjs/contract @terpjs/eslint-boundaries @terpjs/react-core @terpjs/conformance; do
            # Idempotent re-run: skip a package this version already published.
            if [ "$(npm view "$ws@$version" version 2>/dev/null || true)" = "$version" ]; then
              echo "$ws@$version already on the registry — skipping"
              continue
            fi
            npm publish -w "$ws" --access public --provenance
          done

  publish-images:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # provenance: true below emits SLSA build attestations, which require the
      # docker-container buildx driver — the default `docker` driver rejects them
      # ("attestations are not supported by the current builder").
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR repository names must be lowercase; github.repository_owner can be
      # mixed-case (e.g. AITT-NL), so lowercase it before using it in image tags.
      - name: Lowercase the image owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push the production backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/example/Dockerfile.prod
          push: true
          provenance: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/terp-example-backend:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/terp-example-backend:latest
      - name: Build and push the production frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/example/frontend/Dockerfile.prod
          push: true
          provenance: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/terp-example-frontend:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/terp-example-frontend:latest

  # A version tag is a release someone can find: the PyPI/npm/GHCR publishes
  # above plus a GitHub Release entry with generated notes (commits since the
  # previous tag) and the conformance scorecards attached as evidence.
  github-release:
    needs: [publish-pypi, publish-npm, publish-images]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: conformance-scorecards
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent re-run: a release for this tag may already exist.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — skipping"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Terp $GITHUB_REF_NAME" \
            --generate-notes --verify-tag \
            scorecard-*.json
