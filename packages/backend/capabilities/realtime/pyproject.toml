[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "terp-cap-realtime"
version = "0.1.0"
description = "Terp realtime capability — typed, policy-gated SSE and WebSocket channels with one-use connection tickets."
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "terp-core==0.1.0",
]

# Self-registering: the kernel mounts the authenticated ticket + transport
# router at /api/v1/realtime behind Policy.default(). App code declares typed
# channels and publishes through the capability's public registry/broker seam.
[project.entry-points."terp.capabilities"]
realtime = "terp.capabilities.realtime:module"

# PEP 420 namespace package: this distribution owns only
# `terp.capabilities.realtime`.
[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/terp/capabilities/realtime"]
