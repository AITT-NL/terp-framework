[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "terp-migrations"
version = "0.1.0"
description = "Terp migrations — Alembic integration for independent per-package histories (terp migrate)."
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "terp-core==0.1.0",
    "alembic>=1.13",
]

# A standalone entry point as well as the unified `terp migrate` subcommand
# (terp-cli delegates here), so the migration tooling is usable on its own.
[project.scripts]
terp-migrate = "terp.migrations.cli:migrate_main"

# PEP 420 namespace package: this distribution owns only `terp.migrations`.
# `only-include` ships the package tree, including the shared `_alembic/` env +
# script template (env.py / script.py.mako) consumed by Alembic at runtime.
[tool.hatch.build.targets.wheel]
sources = ["src"]
only-include = ["src/terp/migrations"]
