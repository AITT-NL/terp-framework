# copier.yml — Terp client-app template (design §13 Phase 5).
# Render a runnable, secure-by-default repo:  copier copy gh:AITT-NL/TERP/template ./my-app
_subdirectory: project
_templates_suffix: .jinja

project_name:
  type: str
  help: Human-readable application name
  default: My Terp App

project_slug:
  type: str
  help: Distribution name (lowercase, dashes)
  default: my-terp-app

# ---------------------------------------------------------------------------
# Layout preset — the shape the app starts in. All four render a runnable,
# loginnable app with NO pre-built domain module: the first module is created
# on demand (`terp new module <name>` / the agent), named after the actual
# domain — so there is nothing generic to rename or delete. The presets
# differ only in the home page that greets a signed-in user.
#   blank — a welcome page; modules are built afterwards.
#   hub   — a HubPage landing at "/" with placeholder cards to wire up.
#   process — a work-queue landing grouped by status (placeholder cards).
#   portal  — a personal landing focused on the signed-in user (placeholder
#             cards; apply an ownership trait when modules arrive).
# ---------------------------------------------------------------------------
layout:
  type: str
  help: Starting layout
  default: blank
  choices:
    "Blank shell — sign-in and admin only; add modules later": blank
    "Hub landing — a dashboard of cards into each area": hub
    "Process — a status-based work queue for requests and cases": process
    "Portal — a personal overview for customers, staff or suppliers": portal

# ---------------------------------------------------------------------------
# Capability toggles — each adds the dependency AND its composition-root
# wiring, so a toggled capability works out of the box (nothing half-mounted).
# Deliberately small: capabilities that need domain decisions (webhooks,
# background jobs, multi-tenancy) are wired per-app afterwards instead.
# ---------------------------------------------------------------------------
use_files:
  type: bool
  help: File uploads (terp-cap-files) — streamed storage + admin surface
  default: false

use_sso:
  type: bool
  help: Single sign-on via OIDC (terp-cap-oidc) — enabled by OIDC_* settings
  default: false

use_events:
  type: bool
  help: Domain events (terp-cap-eventbus) — typed catalog + in-process dispatch
  default: false

use_realtime:
  type: bool
  help: Realtime channels (terp-cap-realtime) — typed SSE + WebSocket subscriptions
  default: false
