# Production nginx config for the SPA (ADR 0062). Serves the built bundle with an SPA
# fallback and proxies /api to the backend service, so the browser stays same-origin.
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Hashed build assets are immutable: cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Same-origin API: proxy to the backend service (compose service name `api`).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every other route renders index.html (client-side router).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
